<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Ujian: Maru (○) atau Batsu (×) - 35 Soal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Noto Sans JP', 'Yu Gothic', 'Meiryo', Roboto, sans-serif;
            background: #eef5e8;
            color: #1e2a2e;
            padding: 12px;
            min-height: 100vh;
        }

        .quiz-container {
            max-width: 750px;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            box-shadow: 0 16px 32px rgba(0, 32, 0, 0.12);
            overflow: hidden;
        }

        .quiz-header {
            background: #1b5e20;
            color: white;
            padding: 20px 20px 16px;
            text-align: center;
        }

        .quiz-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .quiz-header .bagian-info {
            font-size: 0.8rem;
            margin-top: 8px;
            background: #2e7d32;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 60px;
        }

        .quiz-header p {
            font-size: 0.75rem;
            margin-top: 8px;
            opacity: 0.9;
        }

        .info-panel {
            padding: 12px 18px 0 18px;
            background: white;
            border-bottom: 1px solid #e2e8e4;
        }

        .progress-bar-bg {
            background: #e9ecef;
            border-radius: 30px;
            height: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: #43a047;
            width: 0%;
            height: 100%;
            transition: width 0.25s ease;
            border-radius: 30px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #2c5e2a;
            background: #f9fbf7;
            padding: 6px 12px;
            border-radius: 60px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .restart-btn {
            background: #ffecb3;
            border: none;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #bf5e00;
            cursor: pointer;
            transition: 0.2s;
        }

        .restart-btn:active {
            transform: scale(0.96);
        }

        .question-card {
            padding: 22px 20px 16px 20px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            background: #fefaf0;
            padding: 20px 18px;
            border-radius: 32px;
            box-shadow: inset 0 1px 2px #0001, 0 3px 6px rgba(0,0,0,0.03);
            margin-bottom: 28px;
            line-height: 1.7;
            word-break: break-word;
            font-family: 'Noto Sans JP', system-ui;
            border: 1px solid #e9e0cc;
        }

        .ruby-text {
            font-size: 0.8rem;
            color: #888;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #e0dcc8;
        }

        .options {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 16px 0 8px;
        }

        .option-btn {
            flex: 1;
            min-width: 140px;
            background: #fefefe;
            border: 2px solid #cfdfd5;
            border-radius: 100px;
            padding: 16px 8px;
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .option-btn span:first-child {
            font-size: 2rem;
        }

        .option-btn .label {
            font-size: 1rem;
            font-weight: 600;
        }

        .maru-btn {
            border-color: #a5d6a7;
            color: #2e6b2f;
        }

        .batsu-btn {
            border-color: #efb8b8;
            color: #b71c1c;
        }

        .option-btn:active {
            transform: scale(0.97);
        }

        .option-btn.maru-btn.selected-maru {
            background: #c8e6c9;
            border-color: #2e7d32;
            box-shadow: 0 4px 12px rgba(46,125,50,0.2);
        }

        .option-btn.batsu-btn.selected-batsu {
            background: #ffcdd2;
            border-color: #c62828;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 20px 24px;
        }

        .nav-btn {
            background: #eef2ef;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .nav-btn-primary {
            background: #2e7d32;
            color: white;
        }

        .nav-btn-primary:active {
            background: #1b5e20;
        }

        .submit-area {
            text-align: center;
            padding: 8px 20px 28px;
            border-top: 1px solid #e9f0e6;
        }

        .submit-btn {
            background: #ffa726;
            border: none;
            font-size: 1.15rem;
            font-weight: bold;
            padding: 14px 20px;
            border-radius: 60px;
            width: 100%;
            max-width: 280px;
            color: #3c2a1f;
            cursor: pointer;
            box-shadow: 0 4px 0 #e65100;
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #e65100;
        }

        .result-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
            padding: 16px;
        }

        .result-card {
            background: white;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            border-radius: 44px;
            padding: 24px 20px;
            overflow-y: auto;
        }

        .result-card h2 {
            font-size: 1.7rem;
            text-align: center;
            margin-bottom: 16px;
            border-bottom: 3px solid #c8e6c9;
            padding-bottom: 8px;
        }

        .score-circle {
            background: #2e7d32;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            border-radius: 999px;
            width: 140px;
            margin: 8px auto;
            padding: 16px 0;
        }

        .score-breakdown {
            text-align: center;
            margin: 10px 0;
            font-size: 0.85rem;
            color: #555;
        }

        .detail-list {
            margin-top: 20px;
            list-style: none;
        }

        .detail-list li {
            background: #faf9f0;
            margin: 12px 0;
            padding: 14px 16px;
            border-radius: 28px;
            font-size: 0.75rem;
            border-left: 8px solid #9e9e9e;
        }

        .detail-list li.correct {
            border-left-color: #4caf50;
            background: #e8f5e9;
        }

        .detail-list li.wrong {
            border-left-color: #ef5350;
            background: #ffebee;
        }

        .detail-list .soal-jepang {
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: #2c3e2b;
        }

        .detail-list .terjemahan {
            font-size: 0.7rem;
            background: #fff3cf;
            padding: 6px 10px;
            border-radius: 20px;
            margin-top: 8px;
            display: inline-block;
        }

        .close-result {
            background: #2c5e2a;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: bold;
            width: 100%;
            margin-top: 24px;
            font-size: 1rem;
            cursor: pointer;
        }

        .bagian-badge {
            display: inline-block;
            background: #c8e6c9;
            color: #1b5e20;
            font-size: 0.7rem;
            padding: 2px 12px;
            border-radius: 60px;
            margin-bottom: 10px;
        }

        @media (max-width: 550px) {
            .question-text {
                font-size: 0.95rem;
                padding: 14px 16px;
            }
            .option-btn {
                min-width: 120px;
                padding: 12px 6px;
            }
            .option-btn span:first-child {
                font-size: 1.6rem;
            }
            .label {
                font-size: 0.85rem;
            }
            .quiz-header h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container" id="quizApp">
    <div class="quiz-header">
        <h1>🌱 まる・ばつ テスト</h1>
        <div class="bagian-info" id="bagianInfo">もんだい 1-15 / ぜんぶで35もん</div>
        <p>○ = ただしい / × = あやまり</p>
    </div>
    <div class="info-panel">
        <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
        <div class="stats-row">
            <span id="currentIdxDisplay">もんだい 1 / 35</span>
            <span id="answeredStatus">こたえ: 0 / 35</span>
            <button id="restartExamBtn" class="restart-btn">🔄 シャッフルしてさいしょから</button>
        </div>
    </div>
    <div id="questionContainer"></div>
    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn">◀ まえへ</button>
        <button class="nav-btn nav-btn-primary" id="nextBtn">つぎへ ▶</button>
    </div>
    <div class="submit-area">
        <button class="submit-btn" id="submitQuizBtn">📋 さいてい & けっかをみる</button>
    </div>
</div>

<div id="resultModal" class="result-overlay">
    <div class="result-card">
        <h2>📊 テストけっか</h2>
        <div id="scoreDisplay" class="score-circle">0 / 35</div>
        <div id="scoreBreakdown" class="score-breakdown"></div>
        <p style="text-align:center; font-size:0.75rem;">かくもんのせいかいとインドネシアごやく</p>
        <ul id="resultDetailList" class="detail-list"></ul>
        <button class="close-result" id="closeResultBtn">とじる</button>
    </div>
</div>

<script>
    // ======================= 15 soal (bagian 1) dengan kunci jawaban =======================
    // ○ = true (maru), × = false (batsu)
    const questionsPart1 = [
        { text: "【1】こううんをします。つちがかたくなります。", ruby: "こううんをします。つちがかたくなります。", correct: false, translation: "Membajak tanah, membuat tanah menjadi keras. (SALAH: membajak seharusnya membuat tanah gembur, bukan keras)" },
        { text: "【2】せいしは、さくもつにみずをやることです。", ruby: "せいしは、さくもつにみずをやることです。", correct: true, translation: "Irigasi adalah memberi air pada tanaman. (BENAR)" },
        { text: "【3】せひは、ひりょうを つちにいれることです。", ruby: "せひは、ひりょうを つちにいれることです。", correct: true, translation: "Pemupukan adalah memasukkan pupuk ke dalam tanah. (BENAR)" },
        { text: "【4】さかなかす(ぎょふん)は、かがくひりょうです。", ruby: "さかなかす(ぎょふん)は、かがくひりょうです。", correct: false, translation: "Ampas ikan (kotoran ikan) adalah pupuk kimia. (SALAH: ampas ikan adalah pupuk organik)" },
        { text: "【5】のうやくをつかったとき、きろくします。", ruby: "のうやくをつかったとき、きろくします。", correct: true, translation: "Jika menggunakan pestisida harus dicatat. (BENAR)" },
        { text: "【6】きかいをつかうとき、さぎょうのまえに、つかいかたをよくりかいします。", ruby: "きかいをつかうとき、さぎょうのまえに、つかいかたをよくりかいします。", correct: true, translation: "Sebelum menggunakan mesin, harus memahami cara penggunaannya dengan baik. (BENAR)" },
        { text: "【7】キュウリ (きゅうり)は、ようけいさいるいです。", ruby: "きゅうりは、ようけいさいるいです。", correct: false, translation: "Mentimun termasuk sayuran daun. (SALAH: mentimun termasuk sayuran buah)" },
        { text: "【8】コチョウラン (こちょうらん)やシンビジュウム(しんびじゅうむ)は、ようラン (らん)です。", ruby: "こちょうらんやしんびじゅうむは、ようらんです。", correct: true, translation: "Phalaenopsis dan Cymbidium adalah anggrek hias. (BENAR)" },
        { text: "【9】ようえきさいばいは、さくもつをつちにうえます。", ruby: "ようえきさいばいは、さくもつをつちにうえます。", correct: false, translation: "Hidroponik menanam tanaman di tanah. (SALAH: hidroponik adalah budidaya tanpa tanah)" },
        { text: "【10】ポット (ぽっと)いくびょうは、セルトレイ(せるとれい)にたねをまいて、なえをそだてます。", ruby: "ぽっといくびょうは、せるとれいにたねをまいて、なえをそだてます。", correct: true, translation: "Pembibitan pot dilakukan dengan menabur benih di tray sel untuk menumbuhkan bibit. (BENAR)" },
        { text: "【11】しぜんかんきは、かんきせんをまわして、しせつのなかをかんきすることです。", ruby: "しぜんかんきは、かんきせんをまわして、しせつのなかをかんきすることです。", correct: false, translation: "Ventilasi alami adalah mengalirkan udara dengan kipas. (SALAH: ventilasi alami menggunakan angin alami)" },
        { text: "【12】えんげいの しせつのなかでは、かんすい(みずやり)をしません。", ruby: "えんげいの しせつのなかでは、かんすい(みずやり)をしません。", correct: false, translation: "Di dalam fasilitas hortikultura tidak dilakukan penyiraman. (SALAH: penyiraman tetap diperlukan)" },
        { text: "【13】たんとうがたのしせつえんげいの ハウス(はうす)は、 やねが 1つです。", ruby: "たんとうがたのしせつえんげいの はうすは、 やねが ひとつです。", correct: true, translation: "Rumah kaca tipe single span memiliki satu atap. (BENAR)" },
        { text: "【14】しせつのなかでは、びょうきや がいちゅうがすぐにひろがることがあります。", ruby: "しせつのなかでは、びょうきや がいちゅうがすぐにひろがることがあります。", correct: true, translation: "Di dalam fasilitas, penyakit dan hama dapat menyebar dengan cepat. (BENAR)" },
        { text: "【15】マルチング(マルチ)は、つちのうえを プラスチックフィルムなどでおおうことです。", ruby: "マルチング(マルチ)は、つちのうえを プラスチックフィルムなどでおおうことです。", correct: true, translation: "Mulsa adalah menutupi permukaan tanah dengan plastik atau bahan lain. (BENAR)" }
    ];

    // ======================= 20 soal (bagian 2 - 施設園芸) dengan kunci jawaban =======================
    const questionsPart2 = [
        { text: "【1】日本の国土は山が多く、農地が少ないです。", ruby: "にほんのこくどはやまがおおく、のうちがすくないです。", correct: true, translation: "Wilayah Jepang banyak pegunungannya, sehingga lahan pertaniannya sedikit. (BENAR)" },
        { text: "【2】日本には春夏秋冬があります。", ruby: "にほんには はるなつあきふゆがあります。", correct: true, translation: "Di Jepang terdapat empat musim: musim semi, panas, gugur, dan dingin. (BENAR)" },
        { text: "【3】日本の稲作は、ほとんどが直まきです。", ruby: "にほんのいなさくは、ほとんどがじかまきです。", correct: false, translation: "Sebagian besar penanaman padi di Jepang dilakukan dengan cara langsung menabur benih. (SALAH: sebagian besar menggunakan bibit/persemaian)" },
        { text: "【4】誘引は混み合った葉を除く作業です。", ruby: "ゆういんは こみあったはをのぞくさぎょうです。", correct: false, translation: "Pengikatan adalah pekerjaan untuk membuang daun yang terlalu rapat. (SALAH: pengikatan adalah merambatkan tanaman)" },
        { text: "【5】元肥は作物を植え付ける前に与える肥料です。", ruby: "もとごえはさくもつを うえつけるまえにあたえるひりょうです。", correct: true, translation: "Pupuk dasar adalah yang diberikan sebelum menanam tanaman. (BENAR)" },
        { text: "【6】硫安は有機質肥料です。", ruby: "りゅうあんは ゆうきしつひりょうです。", correct: false, translation: "Ammonium sulfat adalah pupuk organik. (SALAH: ammonium sulfat adalah pupuk kimia)" },
        { text: "【7】トラクターは水田や畑を耕すのに使います。", ruby: "トラクターはすいでんや はたけをたがやすのにつかいます。", correct: true, translation: "Traktor digunakan untuk membajak sawah dan ladang. (BENAR)" },
        { text: "【8】機械作業の前に農業機械を点検します。", ruby: "きかいさぎょうのまえにのうぎょうきかいをてんけんします。", correct: true, translation: "Sebelum bekerja dengan mesin, periksa kondisi mesin pertanian. (BENAR)" },
        { text: "【9】農薬は効果がなければ何回でも使用できます。", ruby: "のうやくはこうかがなければ なんかいでもしようできます。", correct: false, translation: "Pestisida bisa digunakan berkali-kali jika tidak memberikan efek. (SALAH: harus bergantian atau konsultasi ahli)" },
        { text: "【10】燃料を入れるときは、農業機械のエンジンを止めます。", ruby: "ねんりょうをいれるときはのうぎょうきかいのエンジンをとめます。", correct: true, translation: "Ketika mengisi bahan bakar, matikan mesin alat pertanian. (BENAR)" },
        { text: "【11】チューリップ、ユリは毎年、種子をまいて、栽培する。", ruby: "チューリップ、ユリはまいとし、しゅしをまいて さいばいする。", correct: false, translation: "Bunga tulip dan lily ditanam setiap tahun dari biji. (SALAH: menggunakan umbi)" },
        { text: "【12】抑制栽培は、普通栽培より収穫時期を早くすることです。", ruby: "よくせいさいばいは、ふつうさいばいより しゅうかくじきをはやくすることです。", correct: false, translation: "Budidaya terkontrol adalah mempercepat waktu panen. (SALAH:抑制栽培 adalah memperlambat/menunda panen)" },
        { text: "【13】ガラス温室は毎年、ガラスを取り替えます。", ruby: "がらすおんしつは まいとし ガラスをとりかえます。", correct: false, translation: "Rumah kaca kaca setiap tahun mengganti kaca. (SALAH: tidak perlu diganti tiap tahun)" },
        { text: "【14】連棟型ハウスは棟が繋がったハウスです。", ruby: "れんとうがたはうすはむねがつながったハウスです。", correct: true, translation: "Rumah kaca tipe deret adalah rumah kaca dengan beberapa atap yang terhubung. (BENAR)" },
        { text: "【15】不織布は主に、ハウス内の保湿に使います。", ruby: "ふしょくふはおもに ハウス ないの ほおんにつかいます。", correct: false, translation: "Kain non anyaman terutama digunakan untuk menjaga kehangatan (bukan 保湿). (SALAH: untuk保温/kehangatan)" },
        { text: "【16】暖房装置はハウス内を冷やす装置です。", ruby: "だんぼうそうちはハウス ないをひやすそうちです。", correct: false, translation: "Alat pemanas adalah perangkat untuk mendinginkan rumah kaca. (SALAH: untuk memanaskan)" },
        { text: "【17】換気の目的は、ハウス内の温度を下げる目的です。", ruby: "かんきのもくてきは、ハウスないの おんどをさげるもくてきです。", correct: true, translation: "Tujuan ventilasi adalah untuk menurunkan suhu di dalam rumah kaca. (BENAR)" },
        { text: "【18】養液栽培は水と肥料を同時に与えます。", ruby: "ようえきさいばいはみずとひりょうをどうじにあたえます。", correct: true, translation: "Budidaya hidroponik memberikan air dan pupuk secara bersamaan. (BENAR)" },
        { text: "【19】マルチングは土をよく乾燥させる為にします。", ruby: "マルチングは つちをよくかんそうさせるためにします。", correct: false, translation: "Mulsa dilakukan untuk menjaga tanah tetap lembap, bukan mengeringkannya. (SALAH)" },
        { text: "【20】施設の中は、湿度が低くなりやすいので、病気が出にくいです。", ruby: "しせつのなかはしつどがひくくなりやすいのでびょうきがでにくいです。", correct: false, translation: "Di dalam fasilitas, kelembapan cenderung rendah, sehingga penyakit sulit muncul. (SALAH: justru penyakit mudah muncul jika kelembaban tinggi)" }
    ];

    // Gabungkan semua soal
    const allQuestions = [...questionsPart1, ...questionsPart2];
    const TOTAL_QUESTIONS = allQuestions.length;

    let currentQuestions = [];
    let userAnswers = [];
    let currentIndex = 0;

    const questionContainer = document.getElementById('questionContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const submitBtn = document.getElementById('submitQuizBtn');
    const restartBtn = document.getElementById('restartExamBtn');
    const progressFill = document.getElementById('progressFill');
    const currentIdxDisplay = document.getElementById('currentIdxDisplay');
    const answeredStatusSpan = document.getElementById('answeredStatus');
    const resultModal = document.getElementById('resultModal');
    const closeResultBtn = document.getElementById('closeResultBtn');
    const scoreDisplayDiv = document.getElementById('scoreDisplay');
    const scoreBreakdownDiv = document.getElementById('scoreBreakdown');
    const resultDetailList = document.getElementById('resultDetailList');
    const bagianInfo = document.getElementById('bagianInfo');

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function updateBagianInfo() {
        if (currentIndex < 15) {
            bagianInfo.innerHTML = "📗 もんだい 1-15 (だいいちぶ) | ぜんぶで35もん";
        } else {
            bagianInfo.innerHTML = "📘 もんだい 16-35 (だいにぶ: しせつえんげい) | ぜんぶで35もん";
        }
    }

    function resetAndShuffle() {
        currentQuestions = allQuestions.map(q => ({ ...q }));
        currentQuestions = shuffleArray(currentQuestions);
        userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
        currentIndex = 0;
        renderCurrentQuestion();
        updateMetaInfo();
        updateBagianInfo();
        closeModalImmediately();
    }

    function closeModalImmediately() {
        resultModal.style.visibility = 'hidden';
        resultModal.style.opacity = '0';
    }

    function updateMetaInfo() {
        const answeredCount = userAnswers.filter(a => a !== null).length;
        answeredStatusSpan.innerText = `こたえ: ${answeredCount} / ${TOTAL_QUESTIONS}`;
        const percent = ((currentIndex + 1) / TOTAL_QUESTIONS) * 100;
        progressFill.style.width = `${percent}%`;
        currentIdxDisplay.innerText = `もんだい ${currentIndex+1} / ${TOTAL_QUESTIONS}`;
        updateBagianInfo();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCurrentQuestion() {
        if (!currentQuestions.length) return;
        const q = currentQuestions[currentIndex];
        const currentAnswer = userAnswers[currentIndex];
        const displayText = q.ruby || q.text;
        const originalText = q.text;
        const html = `
            <div class="question-card">
                <div class="question-text">
                    ${escapeHtml(displayText)}
                    <div class="ruby-text">📖 ${escapeHtml(originalText)}</div>
                </div>
                <div class="options">
                    <button class="option-btn maru-btn" id="maruOptionBtn">
                        <span>○</span> <span class="label">まる (ただしい)</span>
                    </button>
                    <button class="option-btn batsu-btn" id="batsuOptionBtn">
                        <span>×</span> <span class="label">ばつ (あやまり)</span>
                    </button>
                </div>
            </div>
        `;
        questionContainer.innerHTML = html;
        
        const maruBtn = document.getElementById('maruOptionBtn');
        const batsuBtn = document.getElementById('batsuOptionBtn');
        
        if (currentAnswer === true) {
            maruBtn.classList.add('selected-maru');
        } else if (currentAnswer === false) {
            batsuBtn.classList.add('selected-batsu');
        }
        
        maruBtn.addEventListener('click', () => {
            userAnswers[currentIndex] = true;
            updateMetaInfo();
            renderCurrentQuestion();
        });
        batsuBtn.addEventListener('click', () => {
            userAnswers[currentIndex] = false;
            updateMetaInfo();
            renderCurrentQuestion();
        });
    }

    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
            updateMetaInfo();
        }
    }

    function goNext() {
        if (currentIndex < TOTAL_QUESTIONS - 1) {
            currentIndex++;
            renderCurrentQuestion();
            updateMetaInfo();
        }
    }

    function showResultWithTranslations() {
        let correctCount = 0;
        let part1Correct = 0;
        let part2Correct = 0;
        let detailsHtml = '';
        
        for (let i = 0; i < currentQuestions.length; i++) {
            const userChoice = userAnswers[i];
            const isCorrectAnswer = currentQuestions[i].correct;
            let isUserCorrect = false;
            
            if (userChoice !== null) {
                isUserCorrect = (userChoice === isCorrectAnswer);
            }
            if (isUserCorrect) {
                correctCount++;
                if (i < 15) part1Correct++;
                else part2Correct++;
            }
            
            const userAnswerText = (userChoice === null) ? "⚠️ こたえなし" : (userChoice === true ? "○ (まる / ただしい)" : "× (ばつ / あやまり)");
            const correctAnswerText = isCorrectAnswer ? "○ (ただしい)" : "× (あやまり)";
            const liClass = isUserCorrect ? 'correct' : 'wrong';
            const statusIcon = isUserCorrect ? '✅' : '❌';
            const bagianLabel = (i < 15) ? "【だいいちぶ】" : "【だいにぶ】";
            
            detailsHtml += `
                <li class="${liClass}">
                    <div class="soal-jepang">${statusIcon} ${bagianLabel} もんだい ${i+1}: ${escapeHtml(currentQuestions[i].text)}</div>
                    <div style="font-size:0.7rem; margin-top:6px;">👤 あなたのこたえ: ${userAnswerText} | せいかい: ${correctAnswerText}</div>
                    <div class="terjemahan">📖 ${escapeHtml(currentQuestions[i].translation)}</div>
                </li>
            `;
        }
        
        scoreDisplayDiv.innerHTML = `${correctCount} / ${TOTAL_QUESTIONS}<br><span style="font-size:0.9rem;">(${Math.round((correctCount/TOTAL_QUESTIONS)*100)}%)</span>`;
        scoreBreakdownDiv.innerHTML = `📗 だいいちぶ (もんだい1-15): ${part1Correct}/15 &nbsp;|&nbsp; 📘 だいにぶ (もんだい16-35): ${part2Correct}/20`;
        resultDetailList.innerHTML = detailsHtml;
        resultModal.style.visibility = 'visible';
        resultModal.style.opacity = '1';
    }

    function submitQuiz() {
        const unanswered = userAnswers.filter(a => a === null).length;
        if (unanswered > 0) {
            if (confirm(`⚠️ ${unanswered}もん みかいとうです。みかいとうは「ふせいかい」としてカウントされます。よろしいですか？`)) {
                showResultWithTranslations();
            }
        } else {
            showResultWithTranslations();
        }
    }

    function closeModal() {
        resultModal.style.visibility = 'hidden';
        resultModal.style.opacity = '0';
    }

    function bindEvents() {
        prevBtn.addEventListener('click', goPrev);
        nextBtn.addEventListener('click', goNext);
        submitBtn.addEventListener('click', submitQuiz);
        restartBtn.addEventListener('click', () => {
            if (confirm("もんだいをシャッフルしてさいしょからやりなおしますか？")) {
                resetAndShuffle();
            }
        });
        closeResultBtn.addEventListener('click', closeModal);
        resultModal.addEventListener('click', (e) => {
            if (e.target === resultModal) closeModal();
        });
    }

    function init() {
        currentQuestions = allQuestions.map(q => ({ ...q }));
        currentQuestions = shuffleArray(currentQuestions);
        userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
        currentIndex = 0;
        renderCurrentQuestion();
        updateMetaInfo();
        bindEvents();
    }

    init();
</script>
</body>
</html>
