<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Ujian: Maru (○) atau Batsu (×) - 15 Soal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Noto Sans JP', 'Yu Gothic', 'Meiryo', Roboto, sans-serif;
            background: #eef5e8;
            color: #1e2a2e;
            padding: 12px;
            min-height: 100vh;
        }

        .quiz-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            box-shadow: 0 16px 32px rgba(0, 32, 0, 0.12);
            overflow: hidden;
        }

        .quiz-header {
            background: #1b5e20;
            color: white;
            padding: 20px 20px 16px;
            text-align: center;
        }

        .quiz-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quiz-header p {
            font-size: 0.8rem;
            margin-top: 6px;
            opacity: 0.9;
        }

        .info-panel {
            padding: 12px 18px 0 18px;
            background: white;
            border-bottom: 1px solid #e2e8e4;
        }

        .progress-bar-bg {
            background: #e9ecef;
            border-radius: 30px;
            height: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: #43a047;
            width: 0%;
            height: 100%;
            transition: width 0.25s ease;
            border-radius: 30px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #2c5e2a;
            background: #f9fbf7;
            padding: 6px 12px;
            border-radius: 60px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .restart-btn {
            background: #ffecb3;
            border: none;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #bf5e00;
            cursor: pointer;
            transition: 0.2s;
        }

        .restart-btn:active {
            transform: scale(0.96);
        }

        .question-card {
            padding: 22px 20px 16px 20px;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 500;
            background: #fefaf0;
            padding: 20px 18px;
            border-radius: 32px;
            box-shadow: inset 0 1px 2px #0001, 0 3px 6px rgba(0,0,0,0.03);
            margin-bottom: 28px;
            line-height: 1.5;
            word-break: break-word;
            font-family: 'Noto Sans JP', system-ui;
            border: 1px solid #e9e0cc;
        }

        .options {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 16px 0 8px;
        }

        .option-btn {
            flex: 1;
            min-width: 140px;
            background: #fefefe;
            border: 2px solid #cfdfd5;
            border-radius: 100px;
            padding: 16px 8px;
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .option-btn span:first-child {
            font-size: 2rem;
        }

        .option-btn .label {
            font-size: 1rem;
            font-weight: 600;
        }

        .maru-btn {
            border-color: #a5d6a7;
            color: #2e6b2f;
        }

        .batsu-btn {
            border-color: #efb8b8;
            color: #b71c1c;
        }

        .option-btn:active {
            transform: scale(0.97);
        }

        .option-btn.maru-btn.selected-maru {
            background: #c8e6c9;
            border-color: #2e7d32;
            box-shadow: 0 4px 12px rgba(46,125,50,0.2);
        }

        .option-btn.batsu-btn.selected-batsu {
            background: #ffcdd2;
            border-color: #c62828;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 20px 24px;
        }

        .nav-btn {
            background: #eef2ef;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .nav-btn-primary {
            background: #2e7d32;
            color: white;
        }

        .nav-btn-primary:active {
            background: #1b5e20;
        }

        .submit-area {
            text-align: center;
            padding: 8px 20px 28px;
            border-top: 1px solid #e9f0e6;
        }

        .submit-btn {
            background: #ffa726;
            border: none;
            font-size: 1.15rem;
            font-weight: bold;
            padding: 14px 20px;
            border-radius: 60px;
            width: 100%;
            max-width: 260px;
            color: #3c2a1f;
            cursor: pointer;
            box-shadow: 0 4px 0 #e65100;
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #e65100;
        }

        .result-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
            padding: 16px;
        }

        .result-card {
            background: white;
            max-width: 650px;
            width: 100%;
            max-height: 85vh;
            border-radius: 44px;
            padding: 24px 20px;
            overflow-y: auto;
        }

        .result-card h2 {
            font-size: 1.7rem;
            text-align: center;
            margin-bottom: 16px;
            border-bottom: 3px solid #c8e6c9;
            padding-bottom: 8px;
        }

        .score-circle {
            background: #2e7d32;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            border-radius: 999px;
            width: 120px;
            margin: 8px auto;
            padding: 16px 0;
        }

        .detail-list {
            margin-top: 20px;
            list-style: none;
        }

        .detail-list li {
            background: #faf9f0;
            margin: 12px 0;
            padding: 14px 16px;
            border-radius: 28px;
            font-size: 0.8rem;
            border-left: 8px solid #9e9e9e;
        }

        .detail-list li.correct {
            border-left-color: #4caf50;
            background: #e8f5e9;
        }

        .detail-list li.wrong {
            border-left-color: #ef5350;
            background: #ffebee;
        }

        .detail-list .soal-jepang {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: #2c3e2b;
        }

        .detail-list .terjemahan {
            font-size: 0.7rem;
            background: #fff3cf;
            padding: 6px 10px;
            border-radius: 20px;
            margin-top: 8px;
            display: inline-block;
        }

        .close-result {
            background: #2c5e2a;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: bold;
            width: 100%;
            margin-top: 24px;
            font-size: 1rem;
            cursor: pointer;
        }

        @media (max-width: 550px) {
            .question-text {
                font-size: 1.1rem;
                padding: 14px 16px;
            }
            .option-btn {
                min-width: 120px;
                padding: 12px 6px;
            }
            .option-btn span:first-child {
                font-size: 1.6rem;
            }
            .label {
                font-size: 0.85rem;
            }
            .quiz-header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container" id="quizApp">
    <div class="quiz-header">
        <h1>🌱 まる・ばつ テスト</h1>
        <p>○ = ただしい / × = あやまり</p>
    </div>
    <div class="info-panel">
        <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
        <div class="stats-row">
            <span id="currentIdxDisplay">もんだい 1 / 15</span>
            <span id="answeredStatus">こたえ: 0 / 15</span>
            <button id="restartExamBtn" class="restart-btn">🔄 シャッフルしてさいしょから</button>
        </div>
    </div>
    <div id="questionContainer"></div>
    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn">◀ まえへ</button>
        <button class="nav-btn nav-btn-primary" id="nextBtn">つぎへ ▶</button>
    </div>
    <div class="submit-area">
        <button class="submit-btn" id="submitQuizBtn">📋 さいてい & けっかをみる</button>
    </div>
</div>

<div id="resultModal" class="result-overlay">
    <div class="result-card">
        <h2>📊 テストけっか</h2>
        <div id="scoreDisplay" class="score-circle">0 / 15</div>
        <p style="text-align:center; font-size:0.8rem;">かくもんのせいかいとインドネシアごやく</p>
        <ul id="resultDetailList" class="detail-list"></ul>
        <button class="close-result" id="closeResultBtn">とじる</button>
    </div>
</div>

<script>
    // ======================= 15もん (しゃしんから ぜんぶひらがな) =======================
    const masterQuestions = [
        { text: "【11】しぜんかんきょう、かんきせんを まわして、しせつの なかを かんきする ことです。", correct: false, translation: "Ventilasi alami adalah mengalirkan udara dengan kipas. (SALAH: ventilasi alami bukan dengan kipas, melainkan aliran udara alami)" },
        { text: "【12】えんげいの しせつの なかでは、かんすい（みずやり）を しません。", correct: false, translation: "Di dalam fasilitas hortikultura tidak dilakukan penyiraman. (SALAH, penyiraman tetap diperlukan)" },
        { text: "【13】たんとうがたの しせつえんげいの ハウス（はうす）は、やねが ひとつです。", correct: true, translation: "Rumah kaca tipe single span memiliki satu atap. (BENAR)" },
        { text: "【14】しせつの なかでは、びょうきや がいちゅうが すぐに ひろがる ことが あります。", correct: true, translation: "Di dalam fasilitas, penyakit dan hama dapat menyebar dengan cepat. (BENAR)" },
        { text: "【15】マルチング（マルチ）は、つちの うえを プラスチックフィルムなどで おおう ことです。", correct: true, translation: "Mulsa adalah menutupi permukaan tanah dengan plastik atau bahan lain. (BENAR)" },
        { text: "このようなメモをします。つながりたいじょうほうを、メモするということです。", correct: false, translation: "Pernyataan tentang mencatat informasi tidak tepat dalam konteks pertanian. (SALAH)" },
        { text: "せいひょうは、ひょうにごをかくことです。", correct: false, translation: "Pernyataan keliru tentang memberi label. (SALAH)" },
        { text: "ひりょうは、つちにえいようをあたえるためにまくものです。", correct: true, translation: "Pupuk adalah sesuatu yang disebarkan untuk memberikan nutrisi ke tanah. (BENAR)" },
        { text: "たいひは、どじょうのちからをあげるために、つちにうめこむものです。", correct: true, translation: "Pupuk kandang dibenamkan ke tanah untuk meningkatkan kesuburan tanah. (BENAR)" },
        { text: "のうぎょうでたいせつなのは、みずとたいようだけです。", correct: false, translation: "Yang penting dalam pertanian hanya air dan matahari. (SALAH, masih banyak faktor lain)" },
        { text: "まつりは、ねんにいちどおこなうのうぎょうぎょうじです。", correct: false, translation: "Matsuri adalah acara pertanian yang dilakukan setahun sekali. (SALAH, tidak spesifik)" },
        { text: "えきたいひりょうは、こどひりょうよりもこうりつがよいです。", correct: true, translation: "Pupuk cair lebih efisien daripada pupuk padat. (BENAR)" },
        { text: "さくもつをそだてるには、たねまきがひつようです。", correct: true, translation: "Untuk menanam tanaman, diperlukan penaburan benih. (BENAR)" },
        { text: "ハウスえんげいは、やさいをそだてるのにてきしています。", correct: true, translation: "Hortikultura rumah kaca cocok untuk menanam sayuran. (BENAR)" },
        { text: "こどひりょうは、みずにとかしてからつかいます。", correct: false, translation: "Pupuk padat digunakan setelah dilarutkan dalam air. (SALAH, tidak selalu)" }
    ];

    const TOTAL_QUESTIONS = masterQuestions.length; // 15

    let currentQuestions = [];
    let userAnswers = [];
    let currentIndex = 0;

    const questionContainer = document.getElementById('questionContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const submitBtn = document.getElementById('submitQuizBtn');
    const restartBtn = document.getElementById('restartExamBtn');
    const progressFill = document.getElementById('progressFill');
    const currentIdxDisplay = document.getElementById('currentIdxDisplay');
    const answeredStatusSpan = document.getElementById('answeredStatus');
    const resultModal = document.getElementById('resultModal');
    const closeResultBtn = document.getElementById('closeResultBtn');
    const scoreDisplayDiv = document.getElementById('scoreDisplay');
    const resultDetailList = document.getElementById('resultDetailList');

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function resetAndShuffle() {
        currentQuestions = masterQuestions.map(q => ({ ...q }));
        currentQuestions = shuffleArray(currentQuestions);
        userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
        currentIndex = 0;
        renderCurrentQuestion();
        updateMetaInfo();
        closeModalImmediately();
    }

    function closeModalImmediately() {
        resultModal.style.visibility = 'hidden';
        resultModal.style.opacity = '0';
    }

    function updateMetaInfo() {
        const answeredCount = userAnswers.filter(a => a !== null).length;
        answeredStatusSpan.innerText = `こたえ: ${answeredCount} / ${TOTAL_QUESTIONS}`;
        const percent = ((currentIndex + 1) / TOTAL_QUESTIONS) * 100;
        progressFill.style.width = `${percent}%`;
        currentIdxDisplay.innerText = `もんだい ${currentIndex+1} / ${TOTAL_QUESTIONS}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCurrentQuestion() {
        if (!currentQuestions.length) return;
        const q = currentQuestions[currentIndex];
        const currentAnswer = userAnswers[currentIndex];
        const html = `
            <div class="question-card">
                <div class="question-text">${escapeHtml(q.text)}</div>
                <div class="options">
                    <button class="option-btn maru-btn" id="maruOptionBtn">
                        <span>○</span> <span class="label">まる (ただしい)</span>
                    </button>
                    <button class="option-btn batsu-btn" id="batsuOptionBtn">
                        <span>×</span> <span class="label">ばつ (あやまり)</span>
                    </button>
                </div>
            </div>
        `;
        questionContainer.innerHTML = html;
        
        const maruBtn = document.getElementById('maruOptionBtn');
        const batsuBtn = document.getElementById('batsuOptionBtn');
        
        if (currentAnswer === true) {
            maruBtn.classList.add('selected-maru');
        } else if (currentAnswer === false) {
            batsuBtn.classList.add('selected-batsu');
        }
        
        maruBtn.addEventListener('click', () => {
            userAnswers[currentIndex] = true;
            updateMetaInfo();
            renderCurrentQuestion();
        });
        batsuBtn.addEventListener('click', () => {
            userAnswers[currentIndex] = false;
            updateMetaInfo();
            renderCurrentQuestion();
        });
    }

    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
            updateMetaInfo();
        }
    }

    function goNext() {
        if (currentIndex < TOTAL_QUESTIONS - 1) {
            currentIndex++;
            renderCurrentQuestion();
            updateMetaInfo();
        }
    }

    function showResultWithTranslations() {
        let correctCount = 0;
        let detailsHtml = '';
        
        for (let i = 0; i < currentQuestions.length; i++) {
            const userChoice = userAnswers[i];
            const isCorrectAnswer = currentQuestions[i].correct;
            let isUserCorrect = false;
            
            if (userChoice !== null) {
                isUserCorrect = (userChoice === isCorrectAnswer);
            }
            if (isUserCorrect) correctCount++;
            
            const userAnswerText = (userChoice === null) ? "⚠️ こたえなし" : (userChoice === true ? "○ (まる / ただしい)" : "× (ばつ / あやまり)");
            const correctAnswerText = isCorrectAnswer ? "○ (ただしい)" : "× (あやまり)";
            const liClass = isUserCorrect ? 'correct' : 'wrong';
            const statusIcon = isUserCorrect ? '✅' : '❌';
            
            detailsHtml += `
                <li class="${liClass}">
                    <div class="soal-jepang">${statusIcon} もんだい ${i+1}: ${escapeHtml(currentQuestions[i].text)}</div>
                    <div style="font-size:0.75rem; margin-top:6px;">👤 あなたのこたえ: ${userAnswerText} | せいかい: ${correctAnswerText}</div>
                    <div class="terjemahan">📖 ${escapeHtml(currentQuestions[i].translation)}</div>
                </li>
            `;
        }
        
        scoreDisplayDiv.innerHTML = `${correctCount} / ${TOTAL_QUESTIONS}<br><span style="font-size:0.9rem;">(${Math.round((correctCount/TOTAL_QUESTIONS)*100)}%)</span>`;
        resultDetailList.innerHTML = detailsHtml;
        resultModal.style.visibility = 'visible';
        resultModal.style.opacity = '1';
    }

    function submitQuiz() {
        const unanswered = userAnswers.filter(a => a === null).length;
        if (unanswered > 0) {
            if (confirm(`⚠️ ${unanswered}もん みかいとうです。みかいとうは「ふせいかい」としてカウントされます。よろしいですか？`)) {
                showResultWithTranslations();
            }
        } else {
            showResultWithTranslations();
        }
    }

    function closeModal() {
        resultModal.style.visibility = 'hidden';
        resultModal.style.opacity = '0';
    }

    function bindEvents() {
        prevBtn.addEventListener('click', goPrev);
        nextBtn.addEventListener('click', goNext);
        submitBtn.addEventListener('click', submitQuiz);
        restartBtn.addEventListener('click', () => {
            if (confirm("もんだいをシャッフルしてさいしょからやりなおしますか？")) {
                resetAndShuffle();
            }
        });
        closeResultBtn.addEventListener('click', closeModal);
        resultModal.addEventListener('click', (e) => {
            if (e.target === resultModal) closeModal();
        });
    }

    function init() {
        currentQuestions = masterQuestions.map(q => ({ ...q }));
        currentQuestions = shuffleArray(currentQuestions);
        userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
        currentIndex = 0;
        renderCurrentQuestion();
        updateMetaInfo();
        bindEvents();
    }

    init();
</script>
</body>
</html>
